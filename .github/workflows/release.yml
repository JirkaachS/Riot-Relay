name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test-and-publish:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      npm_config_arch: x64
    steps:
      - name: Check out source
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Generate multi-resolution Windows icon
        shell: pwsh
        run: ./build/make-icon.ps1
      - name: Build x64 NSIS release
        run: npm run dist:nsis
      - name: Build x64 MSI release
        run: npm run dist:msi
      - name: Install custom installer dependencies
        run: npm run installer:install-deps
      - name: Build custom branded installer
        # dist:nsis above already produced dist/win-unpacked as an
        # intermediate step, so it is reused here as the payload source
        # instead of rebuilding it. `npx --prefix` only changes npm's
        # dependency-resolution root, not the working directory, so
        # electron-builder must actually be run with cwd set to installer/
        # or it packages the wrong project (the repo root) into the wrong
        # dist/ directory.
        working-directory: installer
        run: |
          node build-payload.js
          npx electron-builder --config electron-builder.yml --publish never
      - name: Publish complete GitHub release
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $tag = $env:GITHUB_REF_NAME
          $expectedTag = "v${version}"
          if ($tag -ne $expectedTag) {
            throw "Release tag '${tag}' does not match package version '${version}' (expected '${expectedTag}')."
          }
          $assets = @(
            "dist/Riot-Relay-Setup-${version}-x64.exe",
            "dist/Riot-Relay-Setup-${version}-x64.exe.blockmap",
            "dist/latest.yml",
            "dist/Riot-Relay-${version}-x64.msi",
            "installer/dist/Riot-Relay-Installer-${version}-x64.exe"
          )
          $checksumFile = "dist/SHA256SUMS.txt"
          $assets | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_).Hash.ToLowerInvariant()
            "${hash}  $([System.IO.Path]::GetFileName($_))"
          } | Set-Content -Path $checksumFile -Encoding utf8
          $assets += $checksumFile
          $notesFile = ".github/release-notes/${tag}.md"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
            if (Test-Path $notesFile) {
              gh release edit $tag --title "Riot Relay ${version}" --notes-file $notesFile
            }
          } elseif (Test-Path $notesFile) {
            gh release create $tag @assets --title "Riot Relay ${version}" --notes-file $notesFile --verify-tag
          } else {
            gh release create $tag @assets --title "Riot Relay ${version}" --generate-notes --verify-tag
          }